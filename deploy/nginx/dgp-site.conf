server {
    listen 80;
    server_name pmespdgp.online www.pmespdgp.online;
    return 301 https://pmespdgp.online$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pmespdgp.online www.pmespdgp.online;

    # Ajuste os caminhos conforme o certbot no servidor.
    ssl_certificate /etc/letsencrypt/live/pmespdgp.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmespdgp.online/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /opt/dgp-site/python_app/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
}
